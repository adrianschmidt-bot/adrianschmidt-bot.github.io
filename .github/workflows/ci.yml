name: Node CI

on:
  # No branch filter: checks should run for every PR regardless of the branch
  # it targets, so nothing depends on the default branch's name.
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # This job never pushes, so keep the token out of .git/config while npm ci
      # and build run dependency lifecycle scripts (guards against "artipacked").
      with:
        persist-credentials: false
    - uses: ./.github/actions/set-up-node
    - name: npm install and build
      run: |
        npm ci
        npm run build
      env:
        CI: true
    - name: Unit tests
      run: npm run test:unit
    - name: Type-check PWA build assertion
      run: npm run typecheck:pwa
    - name: PWA build check
      run: npm run test:pwa
    # Cache the downloaded browser binaries so reruns don't re-fetch ~150 MB.
    # Keyed on package-lock.json so a @playwright/test bump invalidates it.
    - name: Restore Playwright browsers from cache
      id: playwright-cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-
    # Only chromium is exercised (playwright.config.ts uses Desktop Chrome), so
    # skip firefox/webkit. --with-deps installs the OS libraries chromium needs.
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
    # Save immediately after install — before the e2e step — so the browsers are
    # cached even when the tests fail (a rerun then reuses them). A combined
    # actions/cache would skip this: its post step is post-if: success(), so a
    # failed e2e run would never persist the download. The split save avoids
    # that, and running before the tests means test outcome can't gate it.
    - name: Save Playwright browsers to cache
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
    # Runs against the production bundle in dist/ built by the "npm install and
    # build" step above (playwright.config.ts skips its own build in CI to reuse
    # it). This step must therefore stay after that build step.
    - name: E2E tests
      run: npm run test:e2e
    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
        # warn (not ignore): if e2e fails before a report is written, leave a
        # breadcrumb in the log rather than silently uploading nothing.
        if-no-files-found: warn

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    # Run inside the pinned Playwright image so pixels match the committed
    # baselines exactly (fonts, antialiasing). The image already ships the
    # browsers, so there's no `playwright install` step here.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    env:
      # The gate the visual specs check: run (don't skip) inside this container.
      PLAYWRIGHT_VISUAL: '1'
      CI: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # This job only compares — it never pushes — so keep the token out of
        # .git/config while npm ci / build run dependency lifecycle scripts.
        with:
          persist-credentials: false
      # Fresh Linux install — host node_modules can't be reused across OSes, and
      # the container's toolchain differs from the other jobs' set-up-node.
      - name: npm install and build
        run: |
          npm ci
          npm run build
      # Compares against e2e/visual/**-snapshots/. On the very first run (no
      # baselines committed yet) Playwright writes them and fails; the upload
      # below then carries those fresh baselines out so they can be committed.
      - name: Visual regression tests
        run: npm run test:visual
      # Split into two uploads on purpose: the committed baselines always exist
      # in the workspace, so bundling them with the report would keep
      # if-no-files-found silent even when the report is missing. A dedicated
      # report upload lets `warn` actually fire on the report-missing case.
      - name: Upload visual report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-regression-report
          # The HTML report — diffs for a real regression.
          path: playwright-report-visual/
          retention-days: 7
          if-no-files-found: warn
      - name: Upload visual baselines
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-regression-baselines
          # Any freshly written baselines (first-run seeding when none committed).
          path: e2e/visual/**/*-snapshots/**
          retention-days: 7
          if-no-files-found: warn

  # The `visual` job (and visual-baselines.yml) run inside the pinned
  # mcr.microsoft.com/playwright:<tag> image, which bundles the browser
  # binaries — Playwright refuses to launch when the library version and the
  # bundled browser build differ. Dependabot bumps @playwright/test in
  # package-lock.json but CANNOT touch the container tag in workflow YAML
  # (dependabot-core #5819: its docker ecosystem doesn't scan `container:`
  # references), so the two silently drift and every visual spec fails at
  # launch with a cryptic "Please update docker image as well" — no diff, no
  # screenshots. This guard turns that into one actionable line naming the file
  # and the exact tag to set. It covers visual-baselines.yml (which has no other
  # PR-time signal) AND the package.json `test:visual:update` script, whose
  # `docker run mcr…/playwright:<tag>` baseline-regen command pins the same
  # image and drifts the same way. It only reads files (jq + grep, no npm ci),
  # so it's fast and independent of the container it protects.
  playwright-image:
    name: Playwright image in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Assert container image tags match @playwright/test
        run: |
          set -euo pipefail
          # package-lock.json is the source of truth for the installed version
          # (lockfileVersion 3: .packages["node_modules/@playwright/test"]).
          # Read it via `if !` so a malformed lockfile (a jq parse error, not
          # just a missing key) surfaces this tailored line instead of jq's raw
          # stderr aborting the step under set -e.
          if ! want="$(jq -r '.packages["node_modules/@playwright/test"].version' package-lock.json 2>/dev/null)"; then
            echo "::error::Could not read @playwright/test version from package-lock.json (invalid JSON or jq error)."
            exit 1
          fi
          if [ -z "$want" ] || [ "$want" = null ]; then
            echo "::error::Could not read @playwright/test version from package-lock.json (parsed OK, but the version key is absent)."
            exit 1
          fi
          rc=0
          found=0
          # Every pinned Playwright container image must be v<want>-jammy. Two
          # greps feed one loop because the pin appears in two syntactic shapes:
          #   (1) workflow YAML: an `image:`/`container:` key. Anchored to the
          #       start of the line (after indentation) at that key, so it covers
          #       both the expanded `container:`/`image:` form and the string
          #       shorthand, tolerates an optional leading quote, and can't be
          #       tripped by the `#` doc comment above that quotes a pinned tag.
          #   (2) package.json: the `test:visual:update` baseline-regen script,
          #       where the tag rides inside a one-line `docker run …` command
          #       string, NOT a YAML key — so it needs its own matcher, anchored
          #       on `docker run` (the only such invocation in the repo; JSON has
          #       no comments to false-match, and the guard's own `mcr\.…` source
          #       lines are backslash-escaped, so neither pattern matches them).
          # grep -rn yields file:line:content; `rest` keeps the image URL's own
          # colons intact. The sed captures the FULL tag token after `playwright:`
          # (up to the next space/quote/comment), decoupled from the -jammy
          # suffix, so a non-jammy or otherwise malformed pin is echoed verbatim
          # in the error (and a deliberate distro migration fails with a
          # self-diagnosing message) rather than collapsing to 'unparsed'.
          while IFS=: read -r file line rest; do
            found=$((found + 1))
            tag="$(printf '%s' "$rest" | sed -nE 's#.*playwright:([^[:space:]"'\''#]+).*#\1#p')"
            if [ "$tag" != "v${want}-jammy" ]; then
              echo "::error file=${file},line=${line}::Playwright container image is '${tag:-unparsed}' but @playwright/test is ${want} — bump this tag to v${want}-jammy."
              rc=1
            fi
          done < <(
            # Each grep ends in `|| :` so a no-match (grep exit 1) can't abort
            # this process-substitution subshell under `set -e`. Without it, if
            # the YAML grep found nothing the package.json grep below would never
            # run — silently dropping package.json from coverage. `{ …; }`
            # grouping does NOT help here (set -e still aborts on the first
            # non-zero), so the per-grep `|| :` is required; don't "tidy" it away.
            # Fail-safe regardless: if both greps match nothing, `found` stays 0
            # and the tripwire below exits 1 (loud red, never a false green).
            grep -rnE '^[[:space:]]*(image|container):[[:space:]]*["'\'']?mcr\.microsoft\.com/playwright:' .github/workflows/ || :
            grep -HnE 'docker run .*mcr\.microsoft\.com/playwright:' package.json || :
          )
          if [ "$found" -eq 0 ]; then
            echo "::error::No pinned Playwright container images found under .github/workflows/ or in package.json — this guard expected at least one. If the container approach was removed, drop this job too."
            exit 1
          fi
          if [ "$rc" -eq 0 ]; then
            echo "✅ All ${found} Playwright container image tag(s) match @playwright/test ${want} (v${want}-jammy)."
          fi
          exit $rc

  commitlint:
    name: Commitlint
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.actor != 'dependabot[bot]' && github.event_name != 'merge_group'
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        if: github.actor != 'dependabot[bot]' && github.event_name != 'merge_group'

  autosquash:
    name: Block Autosquash Commits
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Block Autosquash Commits
        if: github.event_name != 'merge_group'
        uses: xt0rted/block-autosquash-commits-action@79880c36b4811fe549cfffe20233df88876024e7 # v2.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  fallow:
    name: Fallow audit
    permissions:
      contents: read
      # Needed for the sticky PR summary comment the action posts.
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # `fallow audit` gates changed code: auto-changed-since derives the PR base,
      # which needs PR context a merge_group event lacks, so audit can't run in a
      # merge queue. Skipped there like commitlint/autosquash (which skip as PR
      # commit/comment checks, not because of a base comparison).
      # (No merge_group trigger today; this keeps the job consistent if one is added.)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.event_name != 'merge_group'
        with:
          persist-credentials: false   # keep the token out of .git/config (artipacked)
          # `fallow audit` is a changed-code command: it always compares HEAD
          # against the PR's base branch, so it needs that history. A shallow
          # checkout makes it fail with "could not detect base branch".
          fetch-depth: 0
      # Self-contained Rust static-analysis binary — no npm ci / build needed.
      # This gates on changed code: auto-changed-since (default true) feeds audit
      # the PR base as its comparison ref, and the default gate (new-only) fails
      # only on issues the PR *introduces*, not pre-existing debt in touched files
      # — the right semantics for gating PRs (incl. Dependabot). fail-on-issues
      # (default true) turns the check red on an issues verdict. Not a required
      # check yet (see the design doc). A whole-repo scan is a different command
      # (`command: ''`), not a gate flag — see the design doc's baseline appendix.
      - uses: fallow-rs/fallow@e36026dfc0f00bfdf8dab889efc58ab86e5ec466 # v2.104.0
        if: github.event_name != 'merge_group'
        with:
          command: audit
          comment: true
          # Pin the CLI version. Unpinned, the action installs the latest
          # published fallow (3.6.0). Starting in 3.5.0, the `@fallow-cli/*`
          # platform packages stopped shipping the `fallow-lsp` (and
          # `fallow-mcp`) binaries, but install-time verification still requires
          # `fallow-lsp`, so 3.5.0/3.5.1/3.6.0 all fail with
          # `fallow-lsp (binary-missing)` before the audit runs. 3.4.2 is the
          # last release whose platform package still contains those binaries.
          # Drop this pin once upstream republishes fixed platform packages.
          version: 3.4.2
