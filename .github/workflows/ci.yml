name: Node CI

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # This job never pushes, so keep the token out of .git/config while npm ci
      # and build run dependency lifecycle scripts (guards against "artipacked").
      with:
        persist-credentials: false
    - uses: ./.github/actions/set-up-node
    - name: npm install and build
      run: |
        npm ci
        npm run build
      env:
        CI: true
    - name: Unit tests
      run: npm run test:unit
    - name: Type-check PWA build assertion
      run: npm run typecheck:pwa
    - name: PWA build check
      run: npm run test:pwa
    # Cache the downloaded browser binaries so reruns don't re-fetch ~150 MB.
    # Keyed on package-lock.json so a @playwright/test bump invalidates it.
    - name: Restore Playwright browsers from cache
      id: playwright-cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-
    # Only chromium is exercised (playwright.config.ts uses Desktop Chrome), so
    # skip firefox/webkit. --with-deps installs the OS libraries chromium needs.
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
    # Save immediately after install — before the e2e step — so the browsers are
    # cached even when the tests fail (a rerun then reuses them). A combined
    # actions/cache would skip this: its post step is post-if: success(), so a
    # failed e2e run would never persist the download. The split save avoids
    # that, and running before the tests means test outcome can't gate it.
    - name: Save Playwright browsers to cache
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
    # Runs against the production bundle in dist/ built by the "npm install and
    # build" step above (playwright.config.ts skips its own build in CI to reuse
    # it). This step must therefore stay after that build step.
    - name: E2E tests
      run: npm run test:e2e
    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
        # warn (not ignore): if e2e fails before a report is written, leave a
        # breadcrumb in the log rather than silently uploading nothing.
        if-no-files-found: warn

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    # Run inside the pinned Playwright image so pixels match the committed
    # baselines exactly (fonts, antialiasing). The image already ships the
    # browsers, so there's no `playwright install` step here.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      # The gate the visual specs check: run (don't skip) inside this container.
      PLAYWRIGHT_VISUAL: '1'
      CI: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # This job only compares — it never pushes — so keep the token out of
        # .git/config while npm ci / build run dependency lifecycle scripts.
        with:
          persist-credentials: false
      # Fresh Linux install — host node_modules can't be reused across OSes, and
      # the container's toolchain differs from the other jobs' set-up-node.
      - name: npm install and build
        run: |
          npm ci
          npm run build
      # Compares against e2e/visual/**-snapshots/. On the very first run (no
      # baselines committed yet) Playwright writes them and fails; the upload
      # below then carries those fresh baselines out so they can be committed.
      - name: Visual regression tests
        run: npm run test:visual
      # Split into two uploads on purpose: the committed baselines always exist
      # in the workspace, so bundling them with the report would keep
      # if-no-files-found silent even when the report is missing. A dedicated
      # report upload lets `warn` actually fire on the report-missing case.
      - name: Upload visual report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-regression-report
          # The HTML report — diffs for a real regression.
          path: playwright-report-visual/
          retention-days: 7
          if-no-files-found: warn
      - name: Upload visual baselines
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-regression-baselines
          # Any freshly written baselines (first-run seeding when none committed).
          path: e2e/visual/**/*-snapshots/**
          retention-days: 7
          if-no-files-found: warn

  commitlint:
    name: Commitlint
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.actor != 'dependabot[bot]' && github.event_name != 'merge_group'
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        if: github.actor != 'dependabot[bot]' && github.event_name != 'merge_group'

  autosquash:
    name: Block Autosquash Commits
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Block Autosquash Commits
        if: github.event_name != 'merge_group'
        uses: xt0rted/block-autosquash-commits-action@79880c36b4811fe549cfffe20233df88876024e7 # v2.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
