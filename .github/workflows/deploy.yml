name: Deploy

# `correlation_id` lets a dispatcher (the deploy orchestrator) tag this run so it
# can find it afterwards — workflow_dispatch does not return a run id. It is
# surfaced through run-name and defaults to empty for manual break-glass dispatch.
run-name: Deploy ${{ inputs.correlation_id }}

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Opaque id echoed into the run name so a dispatcher can find this run'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/set-up-node
      - run: npm ci
      # Echo the baked-in build identifier so the Actions log records it.
      - run: |
          echo "Building $VITE_APP_VERSION"
          npm run build
        env:
          VITE_APP_VERSION: "b${{ github.run_number }}"
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
