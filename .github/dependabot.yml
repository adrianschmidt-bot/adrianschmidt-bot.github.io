# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      lodash:
        patterns:
          - "lodash"
          - "lodash-es"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      semantic-release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
      remark:
        patterns:
          - "react-markdown"
          - "remark-*"
